[build]
  command = "node scripts/create-env.js"
  publish = "."

[functions]
  directory = "netlify/functions"

[[redirects]]
  from = "/api/leads/:id"
  to = "/.netlify/functions/leads?id=:id"
  status = 200

[[redirects]]
  from = "/api/leads"
  to = "/.netlify/functions/leads"
  status = 200

[[redirects]]
  from = "/api/webhooks/:source"
  to = "/.netlify/functions/lead-webhook?source=:source"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

[[headers]]
  for = "/env.js"
  [headers.values]
    Cache-Control = "no-store"

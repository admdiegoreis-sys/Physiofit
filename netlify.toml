[build]
  command = "node scripts/create-env.js"
  publish = "."

[functions]
  directory = "netlify/functions"

[[redirects]]
  from = "/api/leads/:id"
  to = "/.netlify/functions/leads?id=:id"
  status = 200

[[redirects]]
  from = "/api/leads"
  to = "/.netlify/functions/leads"
  status = 200

[[redirects]]
  from = "/api/webhooks/whatsapp"
  to = "/.netlify/functions/lead-webhook-whatsapp"
  status = 200

[[redirects]]
  from = "/api/webhooks/instagram"
  to = "/.netlify/functions/lead-webhook-instagram"
  status = 200

[[redirects]]
  from = "/api/webhooks/email"
  to = "/.netlify/functions/lead-webhook-email"
  status = 200

[[redirects]]
  from = "/api/whatsapp/send"
  to = "/.netlify/functions/whatsapp-send"
  status = 200

[[redirects]]
  from = "/api/webhooks/:source"
  to = "/.netlify/functions/lead-webhook?source=:source"
  status = 200

[[redirects]]
  from = "/auth/invite"
  to = "/.netlify/functions/auth-invite"
  status = 200

[[redirects]]
  from = "/auth/forgot"
  to = "/.netlify/functions/auth-forgot"
  status = 200

[[redirects]]
  from = "/auth/reset"
  to = "/.netlify/functions/auth-reset"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

[[headers]]
  for = "/env.js"
  [headers.values]
    Cache-Control = "no-store"
